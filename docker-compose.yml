version: '3.9'

services:

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: skyapp
      POSTGRES_USER: skyuser
      POSTGRES_PASSWORD: skypass
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    command: gunicorn skyApp.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  postgres_data: