{% extends 'main.html' %}

{% block contenu %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-danger text-white">
                    <h4 class="mb-0">
                        <i class="fas fa-exclamation-triangle me-2"></i>Supprimer le Client
                    </h4>
                </div>
                
                <div class="card-body text-center">
                    <div class="mb-4">
                        <i class="fas fa-trash fa-4x text-danger mb-3"></i>
                        <h4>Confirmer la suppression</h4>
                        <p class="lead">Êtes-vous sûr de vouloir supprimer le client :</p>
                        <h5 class="text-danger">"{{ client.nom_client }}"</h5>
                        <p class="text-muted">ID: #{{ client.id }}</p>
                    </div>
                    
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex justify-content-center gap-3">
                            <a href="{% url 'clients:list_client' %}" class="btn btn-secondary">
                                <i class="fas fa-times me-1"></i> Annuler
                            </a>
                            <button type="submit" class="btn btn-danger">
                                <i class="fas fa-trash me-1"></i> Supprimer définitivement
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock contenu %}
