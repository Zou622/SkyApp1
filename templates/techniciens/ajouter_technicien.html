{% extends 'main.html' %}
{% load static %}

{% block contenu %}
<div class="content-wrapper">
    <div class="container mt-4">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">
                    <i class="fas fa-user-plus me-2"></i> Ajouter un Nouveau Technicien
                </h4>
            </div>
            
            <div class="card-body">
                <form method="post" action="{% url 'enregistrer_technicien' %}" enctype="multipart/form-data">
                    {% csrf_token %}
                    
                    <div class="row">
                        <!-- Colonne 1 : Informations personnelles -->
                        <div class="col-md-6">
                            <h5 class="border-bottom pb-2 mb-3 text-primary">
                                <i class="fas fa-user me-2"></i> Informations Personnelles
                            </h5>
                            
                            <!-- Nom & Prénom -->
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label class="form-label fw-bold">Nom *</label>
                                        <input type="text" class="form-control" name="nom" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label class="form-label fw-bold">Prénom *</label>
                                        <input type="text" class="form-control" name="prenom" required>
                                    </div>
                                </div>
                            </div>
                            
                            <!-- Email & Téléphone -->
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label class="form-label fw-bold">Email *</label>
                                        <input type="email" class="form-control" name="email" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label class="form-label fw-bold">Téléphone *</label>
                                        <input type="tel" class="form-control" name="telephone" required>
                                    </div>
                                </div>
                            </div>
                            
                            <!-- Photo -->
                            <div class="mb-3">
                                <label class="form-label">Photo</label>
                                <input type="file" class="form-control" name="photo" accept="image/*">
                                <small class="text-muted">Format: JPG, PNG (max 2MB)</small>
                            </div>
                            
                            <!-- Date d'embauche -->
                            <div class="mb-3">
                                <label class="form-label fw-bold">Date d'embauche *</label>
                                <input type="date" class="form-control" name="date_embauche" required>
                            </div>
                        </div>
                        
                        <!-- Colonne 2 : Informations professionnelles -->
                        <div class="col-md-6">
                            <h5 class="border-bottom pb-2 mb-3 text-primary">
                                <i class="fas fa-briefcase me-2"></i> Informations Professionnelles
                            </h5>
                            
                            <!-- Spécialité -->
                            <div class="mb-3">
                                <label class="form-label">Spécialité</label>
                                <input type="text" class="form-control" name="specialite" placeholder="Ex: Fibre optique, ADSL, Wi-Fi">
                            </div>
                            
                            <!-- Statut -->
                            <div class="mb-3">
                                <label class="form-label fw-bold">Statut *</label>
                                <select class="form-control" name="statut" required>
                                    <option value="">--- Sélectionner ---</option>
                                    <option value="actif">Actif</option>
                                    <option value="inactif">Inactif</option>
                                    <option value="congé">En congé</option>
                                    <option value="mission">En mission</option>
                                </select>
                            </div>
                            
                            <!-- Adresse & Quartier -->
                            <div class="mb-3">
                                <label class="form-label fw-bold">Adresse *</label>
                                <textarea class="form-control" name="adresse" rows="2" required></textarea>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold">Quartier *</label>
                                <input type="text" class="form-control" name="quartier" required>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Boutons -->
                    <div class="mt-4 border-top pt-3">
                        <div class="d-flex justify-content-between">
                            <a href="{% url 'list_technicien' %}" class="btn btn-secondary">
                                <i class="fas fa-arrow-left me-1"></i> Annuler
                            </a>
                            <button type="submit" class="btn btn-success">
                                <i class="fas fa-save me-1"></i> Enregistrer le technicien
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
.form-control:focus {
    border-color: #0d6efd;
    box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.25);
}

.card {
    border-radius: 10px;
    border: none;
}

.card-header {
    border-radius: 10px 10px 0 0 !important;
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // Prévisualisation de la photo
    const photoInput = document.querySelector('input[name="photo"]');
    const previewContainer = document.createElement('div');
    previewContainer.className = 'mt-2';
    photoInput.parentNode.appendChild(previewContainer);
    
    photoInput.addEventListener('change', function() {
        previewContainer.innerHTML = '';
        
        if (this.files && this.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.createElement('img');
                img.src = e.target.result;
                img.style.maxWidth = '150px';
                img.style.maxHeight = '150px';
                img.className = 'img-thumbnail mt-2';
                previewContainer.appendChild(img);
            }
            reader.readAsDataURL(this.files[0]);
        }
    });
    
    // Validation du formulaire
    const form = document.querySelector('form');
    form.addEventListener('submit', function(e) {
        const email = document.querySelector('input[name="email"]').value.trim();
        const telephone = document.querySelector('input[name="telephone"]').value.trim();
        
        // Validation de l'email
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) {
            alert('Veuillez entrer une adresse email valide.');
            e.preventDefault();
            return false;
        }
        
        // Validation du téléphone (format simplifié)
        const phoneRegex = /^[0-9+\-\s]{8,20}$/;
        if (!phoneRegex.test(telephone)) {
            alert('Veuillez entrer un numéro de téléphone valide.');
            e.preventDefault();
            return false;
        }
        
        return true;
    });
});
</script>
{% endblock contenu %}
