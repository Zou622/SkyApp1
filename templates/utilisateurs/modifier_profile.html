{% extends 'main.html' %}
{% load static %}

{% block contenu %}

<div class="content-wrapper">
    <div class="container mt-4">

        <div class="card shadow card-outline card-primary">
            
            <!-- Header -->
            <div class="card-header d-flex justify-content-between align-items-center">
                <h4 class="mb-0">
                    <i class="fas fa-user-edit mr-2"></i>
                    Modifier mon profil
                </h4>
                <a href="{% url 'users:profile' %}" class="btn btn-secondary btn-sm">
                    <i class="fas fa-arrow-left mr-1"></i> Retour
                </a>
            </div>

            <!-- Body -->
            <div class="card-body">
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    
                    <div class="row">

                        <!-- Photo -->
                        <div class="col-md-4 text-center mb-3">
                            {% if user.photo %}
                                <img src="{{ user.photo.url }}" class="img-fluid rounded-circle border mb-3" style="width:150px;height:150px;object-fit:cover;">
                            {% else %}
                                <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center mb-3"
                                     style="width:150px;height:150px;font-size:48px;font-weight:bold;">
                                    {{ user.first_name|first|upper }}{{ user.last_name|first|upper }}
                                </div>
                            {% endif %}
                            <div class="form-group">
                                <label for="photo">Changer la photo</label>
                                <input type="file" name="photo" id="photo" class="form-control-file">
                            </div>
                        </div>

                        <!-- Infos -->
                        <div class="col-md-8">

                            <div class="form-group mb-3">
                                <label for="first_name">Prénom</label>
                                <input type="text" name="first_name" id="first_name" class="form-control" value="{{ user.first_name }}" required>
                            </div>

                            <div class="form-group mb-3">
                                <label for="last_name">Nom</label>
                                <input type="text" name="last_name" id="last_name" class="form-control" value="{{ user.last_name }}" required>
                            </div>

                            <div class="form-group mb-3">
                                <label for="email">Email</label>
                                <input type="email" name="email" id="email" class="form-control" value="{{ user.email }}" required>
                            </div>

                            <div class="form-group mb-3">
                                <label for="telephone">Téléphone</label>
                                <input type="text" name="telephone" id="telephone" class="form-control" value="{{ user.telephone|default:'' }}">
                            </div>

                            <div class="form-group mb-3">
                                <label for="password">Nouveau mot de passe <small class="text-muted">(laisser vide pour ne pas changer)</small></label>
                                <input type="password" name="password" id="password" class="form-control">
                            </div>

                        </div>

                    </div>

                    <!-- Footer -->
                    <div class="text-right mt-3">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save mr-1"></i> Enregistrer les modifications
                        </button>
                    </div>

                </form>
            </div>

        </div>

    </div>
</div>

{% endblock %}
