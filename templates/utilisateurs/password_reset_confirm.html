{% extends "base.html" %}

{% block content %}
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
document.addEventListener("DOMContentLoaded", function() {
    Swal.fire({
        title: 'Nouveau mot de passe',
        html: `
        <input type="password" id="swal-password1" class="swal2-input" placeholder="Nouveau mot de passe">
        <input type="password" id="swal-password2" class="swal2-input" placeholder="Confirmer mot de passe">
        `,
        confirmButtonText: 'Réinitialiser',
        preConfirm: () => {
            const p1 = Swal.getPopup().querySelector('#swal-password1').value
            const p2 = Swal.getPopup().querySelector('#swal-password2').value
            if(!p1 || !p2) Swal.showValidationMessage(`Remplissez tous les champs`)
            if(p1 !== p2) Swal.showValidationMessage(`Les mots de passe ne correspondent pas`)
            return {password1: p1, password2: p2}
        }
    }).then((result) => {
        if(result.isConfirmed){
            fetch(window.location.href, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                    'X-CSRFToken': '{{ csrf_token }}'
                },
                body: new URLSearchParams(result.value)
            })
            .then(resp => resp.json())
            .then(data => {
                if(data.status === 'success'){
                    Swal.fire('Succès', data.message, 'success')
                    .then(()=> window.location.href = '{% url "users:login" %}')
                } else {
                    Swal.fire('Erreur', data.message, 'error')
                }
            })
        }
    })
});
</script>
{% endblock %}
